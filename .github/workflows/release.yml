name: Release

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Check out merged revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tags_url="https://hub.docker.com/v2/repositories/taltiko/degiro-portfolio-history/tags?page_size=100"
          latest="$({ curl --fail --silent --show-error "$tags_url" | jq -r '.results[].name'; echo 0; } \
            | awk '/^[0-9]+$/ { if ($1 > max) max = $1 } END { print max + 0 }')"
          version="$((latest + 1))"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing version $version"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: taltiko
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            taltiko/degiro-portfolio-history:${{ steps.version.outputs.version }}
            taltiko/degiro-portfolio-history:latest

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: gh release create "$VERSION" --target "$TARGET_SHA" --generate-notes --title "$VERSION"
