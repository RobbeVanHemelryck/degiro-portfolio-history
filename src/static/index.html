                        ${stock.exchange ? `<div class="stock-exchange">${stock.exchange}</div>` : ''}
                        <div class="stock-shares">${stock.shares} shares</div>
                        ${priceInfo}
                        ${positionValueEur}
                        <div class="stock-meta">${stock.transactions_count} transactions</div>
                    </div>
                `;
            }).join('');
        }

        async function loadStockChart(stockId) {
            // Clear any existing refresh interval
            if (chartRefreshInterval) {
                clearInterval(chartRefreshInterval);
                chartRefreshInterval = null;
            }

            selectedStockId = stockId;
            renderHoldings(); // Update active state

            try {
                const response = await fetch(`/api/stock/${stockId}/chart-data`);
                const data = await response.json();

                document.getElementById('chart-section').style.display = 'block';

                // Build chart title with data source and date
                const latestPriceDate = data.prices && data.prices.length > 0 ? data.prices[data.prices.length - 1].date : '';
                const dataProvider = data.stock.data_provider || 'unknown';
                const providerDisplay = dataProvider === 'twelvedata' ? 'Twelve Data' :
                                       dataProvider === 'yahoo' ? 'Yahoo Finance' :
                                       dataProvider === 'fmp' ? 'FMP' : dataProvider;

                const titleElement = document.getElementById('chart-title');
                titleElement.innerHTML = `${data.stock.name} (${data.stock.symbol}) <span style="font-size: 0.7em; color: #718096; font-weight: 400;">(last updated: ${latestPriceDate} from ${providerDisplay})</span>`;

                // Check if we have price data
                if (!data.prices || data.prices.length === 0) {
                    document.getElementById('chart').innerHTML =
                        '<div style="padding: 40px; text-align: center; color: #718096;">' +
                        '<p style="font-size: 18px; margin-bottom: 10px;">📊 No price data available</p>' +
                        '<p style="font-size: 14px;">Price history for this stock has not been fetched yet.</p>' +
                        '</div>';
                    document.getElementById('stats-grid').innerHTML = '';
                    return;
                }

                renderChart(data);
                renderStats(data);

                // Set up auto-refresh every minute
                chartRefreshInterval = setInterval(() => {
                    if (selectedStockId === stockId) {
                        loadStockChart(stockId);
                    }
                }, 60000); // 60000ms = 1 minute

            } catch (error) {
                // Check if server went offline
                const isOnline = await checkServerStatus();
                if (!isOnline) {
                    return; // Server offline banner will be shown
                }
                showError('Failed to load chart data: ' + error.message);
            }
        }

        function renderStats(data) {
            const prices = data.prices.filter(p => p.close !== null);
            if (prices.length === 0) return;

            // Use actual price currency from exchange data, not DEGIRO transaction currency
            const currency = prices.length > 0 && prices[0].currency
                ? prices[0].currency
                : data.stock.currency;
            const latestPrice = prices[prices.length - 1].close;

            // Find the first purchase date of CURRENT holdings
            // Track running shares to find when current position was started
            let oldestPrice = prices[0].close;
            let runningShares = 0;
            let firstPurchaseOfCurrentBatch = null;

            for (const t of data.transactions) {
                runningShares += t.quantity;

                // Reset when sold out completely
                if (runningShares === 0 && t.quantity < 0) {
                    firstPurchaseOfCurrentBatch = null;
                }
                // Track first purchase when starting to accumulate
                else if (!firstPurchaseOfCurrentBatch && t.quantity > 0 && runningShares > 0) {
                    firstPurchaseOfCurrentBatch = t;
                }
            }

            if (firstPurchaseOfCurrentBatch) {
                // Find the price on or after the first purchase of current holdings
                const purchasePrice = prices.find(p => p.date >= firstPurchaseOfCurrentBatch.date);
                if (purchasePrice) {
                    oldestPrice = purchasePrice.close;
                }
            }

            const priceChange = latestPrice - oldestPrice;
            const priceChangePercent = ((priceChange / oldestPrice) * 100).toFixed(2);

            const highPrice = Math.max(...prices.map(p => p.high));
            const lowPrice = Math.min(...prices.map(p => p.low));

            const totalShares = data.transactions.length > 0 ?
                data.transactions[data.transactions.length - 1].shares : 0;

            const statsHtml = `
                <div class="stat-box">
                    <div class="stat-label">Current Price</div>
                    <div class="stat-value">${formatPrice(latestPrice, currency)}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Change Since First Purchase</div>
                    <div class="stat-value" style="color: ${priceChange >= 0 ? '#48bb78' : '#fc8181'}">
                        ${priceChange >= 0 ? '+' : ''}${formatPrice(Math.abs(priceChange), currency)} (${priceChangePercent}%)
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Period High</div>
                    <div class="stat-value">${formatPrice(highPrice, currency)}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Period Low</div>
                    <div class="stat-value">${formatPrice(lowPrice, currency)}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Current Holdings</div>
                    <div class="stat-value">${totalShares} shares</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Position Value</div>
                    <div class="stat-value">${formatPrice(latestPrice * totalShares, currency)}</div>
                </div>
            `;

            document.getElementById('stats-grid').innerHTML = statsHtml;
        }

        function renderChart(data) {
            // Filter out price records with null values
            const validPrices = data.prices.filter(p => p.close !== null);
            if (validPrices.length === 0) {
                document.getElementById('chart-area').innerHTML = '<p style="text-align: center; color: #718096; padding: 40px;">No price data available for this stock yet. Click "Update Market Data" to fetch prices.</p>';
                return;
            }

            const getDateOnly = (value) => (value || '').split('T')[0];

            // Keep ordering stable when daily and intraday points are mixed.
            validPrices.sort((a, b) => new Date(a.date) - new Date(b.date));

            // Use actual price currency from exchange data, not DEGIRO transaction currency
            const currency = validPrices.length > 0 && validPrices[0].currency
                ? validPrices[0].currency
                : data.stock.currency;
            const latestPrice = validPrices[validPrices.length - 1].close;
            const dates = validPrices.map(p => p.date);
            const closePrices = validPrices.map(p => p.close);
            const openPrices = validPrices.map(p => p.open);
            const highPrices = validPrices.map(p => p.high);
            const lowPrices = validPrices.map(p => p.low);

            // ========================================
            // CHART 1: Price Chart (Candlestick)
            // ========================================

            // Main price trace (candlestick)
            const priceTrace = {
                x: dates,
                close: closePrices,
                open: openPrices,
                high: highPrices,
                low: lowPrices,
                type: 'candlestick',
                name: 'Price',
                increasing: { line: { color: '#48bb78' } },
                decreasing: { line: { color: '#fc8181' } }
            };

            // Buy transactions - only show those in the same currency as price data
            // Position markers at the low price of the candlestick for that date to ensure alignment
            const buyTransactions = data.transactions.filter(t =>
                t.transaction_type === 'buy' && t.currency === currency
            );

            const findPriceForTransactionDay = (transactionDate) => {
                const txDay = getDateOnly(transactionDate);
                const sameDayPrices = validPrices.filter(p => getDateOnly(p.date) === txDay);
                if (sameDayPrices.length === 0) return null;
                return sameDayPrices[sameDayPrices.length - 1];
            };

            const buyTrace = {
                x: buyTransactions.map(t => t.date),
                y: buyTransactions.map(t => {
                    // Find the price data for this transaction date
                    const priceData = findPriceForTransactionDay(t.date);
                    // Position marker at the low of the candlestick, or use transaction price as fallback
                    return priceData ? priceData.low : t.price;
                }),
                mode: 'markers',
                name: 'Buy',
                yaxis: 'y',
                marker: {
                    color: '#48bb78',
                    size: 14,
                    symbol: 'triangle-up',
                    line: { color: 'white', width: 2 },
                    opacity: 0.9
                },
                text: buyTransactions.map(t => `Buy ${t.quantity} shares @ ${formatPrice(t.price, t.currency)}`),
                hoverinfo: 'text'
            };

            // Sell transactions - only show those in the same currency as price data
            // Position markers at the high price of the candlestick for that date to ensure alignment
            const sellTransactions = data.transactions.filter(t =>
                t.transaction_type === 'sell' && t.currency === currency
            );

            const sellTrace = {
                x: sellTransactions.map(t => t.date),
                y: sellTransactions.map(t => {
                    // Find the price data for this transaction date
                    const priceData = findPriceForTransactionDay(t.date);
                    // Position marker at the high of the candlestick, or use transaction price as fallback
                    return priceData ? priceData.high : t.price;
                }),
                mode: 'markers',
                name: 'Sell',
                yaxis: 'y',
                marker: {
                    color: '#fc8181',
                    size: 14,
                    symbol: 'triangle-down',
                    line: { color: 'white', width: 2 },
                    opacity: 0.9
                },
                text: sellTransactions.map(t => `Sell ${t.quantity} shares @ ${formatPrice(t.price, t.currency)}`),
                hoverinfo: 'text'
            };

            const priceTraces = [priceTrace, buyTrace];
            if (sellTransactions.length > 0) {
                priceTraces.push(sellTrace);
            }

            const priceLayout = {
                title: '',
                xaxis: {
                    title: '',
                    rangeslider: { visible: false },
                    type: 'date'
                },
                yaxis: {
                    title: `Price (${currency})`,
                    fixedrange: false,
                    autorange: true
                },
                hovermode: 'x unified',
                showlegend: true,
                legend: {
                    x: 0,
                    y: 1.1,
                    orientation: 'h',
                    bgcolor: 'rgba(255, 255, 255, 0.9)'
                },
                plot_bgcolor: '#f7fafc',
                paper_bgcolor: 'white',
                margin: { b: 40, t: 10 },
                font: {
                    family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif'
                }
            };

            const config = {
                responsive: true,
                displayModeBar: true,
                displaylogo: false,
                modeBarButtonsToRemove: ['lasso2d', 'select2d'],
                scrollZoom: false
            };

            // Plotly.newPlot returns a promise
            Plotly.newPlot('chart', priceTraces, priceLayout, config).then(() => {
                // Add data attribute to indicate chart is ready (for tests)
                document.getElementById('chart').setAttribute('data-chart-ready', 'true');
            });

            // ========================================
            // CHART 2: Tranche Value Chart
            // ========================================

            const trancheTraces = [];
            const trancheColors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#fee140'];

            // Sort buy transactions by date for consistent ordering
            const sortedBuyTransactions = [...buyTransactions].sort((a, b) =>
                new Date(a.date) - new Date(b.date)
            );

            // Pre-assign colors and prepare transaction data
            const trancheData = sortedBuyTransactions.map((buyTrans, idx) => {
                const buyDate = buyTrans.date;
                const buyPrice = buyTrans.price;
                const quantity = buyTrans.quantity;
                const color = trancheColors[idx % trancheColors.length];

                // Create arrays for dates and values starting from buy date
                const trancheDates = [];
                const trancheValues = [];

                // Find all prices from buy date onwards
                data.prices.forEach(p => {
                    if (p.date >= buyDate) {
                        trancheDates.push(p.date);
                        // Value = current price * quantity in this tranche
                        trancheValues.push(p.close * quantity);
                    }
                });

                return {
                    buyTrans,
                    buyDate,
                    buyPrice,
                    quantity,
                    color,
                    trancheDates,
                    trancheValues,
                    trancheNumber: idx + 1
                };
            });

            // Create traces only for tranches with price data
            trancheData.forEach(td => {
                if (td.trancheValues.length > 0) {
                    const trancheTrace = {
                        x: td.trancheDates,
                        y: td.trancheValues,
                        mode: 'lines',
                        name: `Tranche ${td.trancheNumber} (${td.quantity} @ ${formatPrice(td.buyPrice, td.buyTrans.currency)})`,
                        line: {
                            color: td.color,
                            width: 2.5
                        },
                        hovertemplate: `<b>Tranche ${td.trancheNumber}</b><br>` +
                                      `Value: ${getCurrencySymbol(currency)}%{y:.2f}<br>` +
                                      `Date: %{x}<extra></extra>`
                    };

                    trancheTraces.push(trancheTrace);
                }
            });

            const trancheLayout = {
                title: '',
                xaxis: {
                    title: 'Date',
                    type: 'date'
                },
                yaxis: {
                    title: `Investment Value (${currency})`,
                    fixedrange: false
                },
                hovermode: 'x unified',
                showlegend: true,
                legend: {
                    x: 0,
                    y: 1.15,
                    orientation: 'h',
                    bgcolor: 'rgba(255, 255, 255, 0.9)'
                },
                plot_bgcolor: '#f7fafc',
                paper_bgcolor: 'white',
                margin: { t: 10 },
                font: {
                    family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif'
                }
            };

            Plotly.newPlot('tranche-chart', trancheTraces, trancheLayout, config);

            // ========================================
            // Tranche List
            // ========================================

            let trancheListHtml = '';

            // Create mapping from tranche number to trace index
            const trancheToTraceMap = {};
            let traceIndex = 0;
            trancheData.forEach((td, idx) => {
                if (td.trancheValues.length > 0) {
                    trancheToTraceMap[idx] = traceIndex;
                    traceIndex++;
                }
            });

            trancheData.forEach((td, idx) => {
                const date = new Date(td.buyDate).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                // Find current value of this tranche
                const currentValue = latestPrice * td.quantity;
                const purchaseValue = td.buyPrice * td.quantity;
                const trancheGain = currentValue - purchaseValue;
                const trancheGainPercent = ((trancheGain / purchaseValue) * 100).toFixed(2);

                trancheListHtml += `
                    <div class="tranche-item" data-tranche-index="${idx}" style="border-left-color: ${td.color}">
                        <div class="tranche-color" style="background-color: ${td.color}"></div>
                        <div class="tranche-details">
                            <div class="tranche-info">
                                <div class="tranche-label">Tranche ${td.trancheNumber}</div>
                                <div class="tranche-date">${date}</div>
                                <div class="tranche-quantity">${td.quantity} shares @ ${formatPrice(td.buyPrice, td.buyTrans.currency)}</div>
                            </div>
                            <div class="tranche-info" style="text-align: right;">
                                <div class="tranche-price">${formatPrice(currentValue, currency)}</div>
                                <div class="tranche-quantity" style="color: ${trancheGain >= 0 ? '#48bb78' : '#fc8181'}">
                                    ${trancheGain >= 0 ? '+' : ''}${formatPrice(Math.abs(trancheGain), currency)} (${trancheGainPercent}%)
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('tranche-list').innerHTML = trancheListHtml;

            // Add click handlers for tranche highlighting
            const trancheItems = document.querySelectorAll('.tranche-item');
            let selectedTrancheIndex = null;

            trancheItems.forEach(item => {
                item.addEventListener('click', function() {
                    const trancheIndex = parseInt(this.getAttribute('data-tranche-index'));
                    const traceIndex = trancheToTraceMap[trancheIndex];

                    // Skip if this tranche doesn't have a corresponding trace
                    if (traceIndex === undefined) {
                        return;
                    }

                    // Toggle selection
                    if (selectedTrancheIndex === trancheIndex) {
                        // Deselect - restore all traces to normal
                        selectedTrancheIndex = null;
                        trancheItems.forEach(ti => ti.classList.remove('selected'));

                        // Reset all traces
                        const updates = {
                            'line.width': Array(trancheTraces.length).fill(2.5),
                            'opacity': Array(trancheTraces.length).fill(1)
                        };
                        Plotly.restyle('tranche-chart', updates);
                    } else {
                        // Select this tranche
                        selectedTrancheIndex = trancheIndex;
                        trancheItems.forEach(ti => ti.classList.remove('selected'));
                        this.classList.add('selected');

                        // Highlight selected trace, dim others
                        const lineWidths = trancheTraces.map((_, i) => i === traceIndex ? 4 : 1.5);
                        const opacities = trancheTraces.map((_, i) => i === traceIndex ? 1 : 0.3);

                        const updates = {
                            'line.width': lineWidths,
                            'opacity': opacities
                        };
                        Plotly.restyle('tranche-chart', updates);
                    }
                });
            });

            // ========================================
            // CHART 3: Position Value % Chart
            // ========================================

            if (data.position_percentage && data.position_percentage.length > 0) {
                const posPercentDates = data.position_percentage.map(p => p.date);
                const posPercentValues = data.position_percentage.map(p => p.percentage);

                // Calculate dynamic Y-axis range centered on 100% (break-even)
                const minValue = Math.min(...posPercentValues);
                const maxValue = Math.max(...posPercentValues);

                // Calculate distance from 100% for both directions
                const distanceBelow = 100 - minValue;
                const distanceAbove = maxValue - 100;

                // Use the larger distance and add 10% padding
                const maxDistance = Math.max(distanceBelow, distanceAbove, 40); // Minimum 40% range
                const padding = maxDistance * 0.1;
                const yRange = [100 - maxDistance - padding, 100 + maxDistance + padding];

                const posPercentTrace = {
                    x: posPercentDates,
                    y: posPercentValues,
                    mode: 'lines',
                    name: 'Position Value',
                    line: {
                        color: '#667eea',
                        width: 3
                    },
                    fill: 'tozeroy',
                    fillcolor: 'rgba(102, 126, 234, 0.2)',
                    hovertemplate: `<b>Position Value</b><br>` +
                                  `%{y:.2f}%<br>` +
                                  `Date: %{x}<extra></extra>`
                };

                const posPercentLayout = {
                    height: 350,
                    xaxis: {
                        title: 'Date',
                        type: 'date',
                        gridcolor: '#e2e8f0'
                    },
                    yaxis: {
                        title: 'Position Value (%)',
                        gridcolor: '#e2e8f0',
                        range: yRange,
                        fixedrange: false,
                        zeroline: true,
                        zerolinecolor: '#cbd5e0'
                    },
                    hovermode: 'x unified',
                    showlegend: false,
                    plot_bgcolor: '#f7fafc',
                    paper_bgcolor: 'white',
                    margin: { t: 10 },
                    font: {
                        family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif'
                    },
                    shapes: [{
                        type: 'line',
                        x0: posPercentDates[0],
                        x1: posPercentDates[posPercentDates.length - 1],
                        y0: 100,
                        y1: 100,
                        line: {
                            color: '#e53e3e',
                            width: 2,
                            dash: 'dash'
                        }
                    }],
                    annotations: [{
                        x: posPercentDates[Math.floor(posPercentDates.length / 2)],
                        y: 100,
                        text: '100% (Break Even)',
                        showarrow: false,
                        yshift: -15,
                        font: {
                            size: 10,
                            color: '#e53e3e'
                        }
                    }]
                };

                Plotly.newPlot('position-percentage-chart', [posPercentTrace], posPercentLayout, config);
            }

            // ========================================
            // CHART 4: Index Comparison Chart
            // ========================================

            if (data.indices && data.indices.length > 0 && data.stock_normalized) {
                const indexTraces = [];

                // Add stock normalized performance
                const stockDates = data.stock_normalized.map(s => s.date);
                const stockNormalized = data.stock_normalized.map(s => s.normalized);

                const stockTrace = {
                    x: stockDates,
                    y: stockNormalized,
                    mode: 'lines',
                    name: data.stock.name,
                    line: {
                        color: '#667eea',
                        width: 3
                    },
                    hovertemplate: `<b>${data.stock.name}</b><br>` +
                                  `Change: %{y:.2f}%<br>` +
                                  `Date: %{x}<extra></extra>`
                };
                indexTraces.push(stockTrace);

                // Add index traces
                const indexColors = ['#48bb78', '#fc8181'];  // Green for S&P, Red for Euro Stoxx
                data.indices.forEach((index, idx) => {
                    const indexDates = index.data.map(d => d.date);
                    const indexValues = index.data.map(d => d.normalized);

                    const indexTrace = {
                        x: indexDates,
                        y: indexValues,
                        mode: 'lines',
                        name: index.name,
                        line: {
                            color: indexColors[idx] || '#718096',
                            width: 2,
                            dash: 'dash'
                        },
                        hovertemplate: `<b>${index.name}</b><br>` +
                                      `Change: %{y:.2f}%<br>` +
                                      `Date: %{x}<extra></extra>`
                    };
                    indexTraces.push(indexTrace);
                });

                const indexLayout = {
                    height: 350,
                    xaxis: {
                        title: 'Date',
                        gridcolor: '#e2e8f0'
                    },
                    yaxis: {
                        title: 'Percentage Change (%)',
                        gridcolor: '#e2e8f0',
                        zeroline: true,
                        zerolinecolor: '#cbd5e0',
                        zerolinewidth: 2
                    },
                    hovermode: 'x unified',
                    showlegend: true,
                    legend: {
                        x: 0,
                        y: 1.15,
                        orientation: 'h',
                        bgcolor: 'rgba(255, 255, 255, 0.9)'
                    },
                    plot_bgcolor: '#f7fafc',
                    paper_bgcolor: 'white',
                    margin: { t: 10 },
                    font: {
                        family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif'
                    }
                };

                Plotly.newPlot('index-chart', indexTraces, indexLayout, config);
            }
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showUploadStatus(message, isSuccess) {
            const statusDiv = document.getElementById('upload-status');
            statusDiv.textContent = message;
            statusDiv.className = 'upload-status ' + (isSuccess ? 'success' : 'error');
            statusDiv.style.display = 'block';

            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }

        function showUploadProgress(message, progress) {
            const progressContainer = document.getElementById('upload-progress');
            const progressMessage = document.getElementById('upload-progress-message');
            const progressBar = document.getElementById('progress-bar-fill');

            progressMessage.textContent = message;
            progressBar.style.width = progress + '%';
            progressContainer.style.display = 'block';
        }

        function hideUploadProgress() {
            const progressContainer = document.getElementById('upload-progress');
            progressContainer.style.display = 'none';
        }

        // Handle file upload
        document.getElementById('file-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            let progressInterval;
            let currentProgress = 0;

            // Pause server status checks during upload
            uploadInProgress = true;

            try {
                // Show initial progress
                showUploadProgress('📤 Uploading file...', 10);

                // Simulate progress animation
                progressInterval = setInterval(() => {
                    if (currentProgress < 90) {
                        currentProgress += Math.random() * 15;
                        if (currentProgress > 90) currentProgress = 90;

                        let message = '📤 Uploading file...';
                        if (currentProgress > 30) {
                            message = '📊 Processing transactions...';
                        }
                        if (currentProgress > 60) {
                            message = '💰 Fetching market prices...';
                        }

                        showUploadProgress(message, currentProgress);
                    }
                }, 500);

                const response = await fetch('/api/upload-transactions', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                // Clear the progress interval
                clearInterval(progressInterval);

                if (result.success) {
                    // Show completion
                    showUploadProgress('✅ Upload complete!', 100);

                    // Hide progress bar and show success message
                    setTimeout(() => {
                        hideUploadProgress();
                        showUploadStatus('✅ ' + result.message + ' - Refreshing page in 3 seconds...', true);

                        // Reload the page after successful upload
                        setTimeout(() => {
                            window.location.reload();
                        }, 3000);
                    }, 1000);
                } else {
                    hideUploadProgress();
                    showUploadStatus('❌ ' + result.message, false);
                }
            } catch (error) {
                clearInterval(progressInterval);
                hideUploadProgress();
                // Resume server status checks
                uploadInProgress = false;
                // Check if server went offline
                const isOnline = await checkServerStatus();
                if (!isOnline) {
                    // Reset file input before returning
                    e.target.value = '';
                    return;
                }
                showUploadStatus('Error uploading file: ' + error.message, false);
            }

            // Resume server status checks (in case of success path without page reload)
            uploadInProgress = false;

            // Reset file input
            e.target.value = '';
        });

        // Load and display market data status
        async function loadMarketDataStatus() {
            try {
                const response = await fetch('/api/market-data-status');
                const data = await response.json();

                const statusDiv = document.getElementById('market-data-status');
                if (!statusDiv) return;

                if (data.has_data && data.latest_date) {
                    const date = new Date(data.latest_date);
                    const formattedDate = date.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                    statusDiv.textContent = `Latest market data: ${formattedDate}`;
                } else {
                    statusDiv.textContent = 'No market data available';
                }
            } catch (error) {
                console.error('Failed to load market data status:', error);
                // Check if server went offline
                await checkServerStatus();
            }
        }

        // Update market data function
        async function updateMarketData() {
            // Pause server status checks during market data update
            uploadInProgress = true;

            try {
                showUploadStatus('📊 Fetching latest market data...', true);

                const response = await fetch('/api/update-market-data', {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.success) {
                    showUploadStatus('✅ ' + result.message + ' - Refreshing page in 3 seconds...', true);
                    // Reload page after successful update
                    setTimeout(() => {
                        window.location.reload();
                    }, 3000);
                } else {
                    // Resume server status checks on non-success response
                    uploadInProgress = false;
                    showUploadStatus('❌ ' + result.message, false);
                }
            } catch (error) {
                // Resume server status checks
                uploadInProgress = false;
                // Check if server went offline
                const isOnline = await checkServerStatus();
                if (!isOnline) {
                    return;
                }
                showUploadStatus('Error updating market data: ' + error.message, false);
            }
        }

        // Show custom confirmation modal
        function showConfirmModal(title, message, icon, onConfirm) {
            const modal = document.getElementById('purge-modal');
            modal.innerHTML = `
                <div class="modal-overlay" onclick="hideConfirmModal(event)">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <div class="modal-icon">${icon}</div>
                            <h2 class="modal-title">${title}</h2>
                        </div>
                        <div class="modal-message">${message}</div>
                        <div class="modal-actions">
                            <button class="modal-btn modal-btn-cancel" onclick="hideConfirmModal()">Cancel</button>
                            <button class="modal-btn modal-btn-danger" id="confirm-action-btn">Delete All Data</button>
                        </div>
                    </div>
                </div>
            `;
            modal.style.display = 'block';

            // Add confirm handler
            document.getElementById('confirm-action-btn').onclick = () => {
                hideConfirmModal();
                onConfirm();
            };

            // Close on ESC key
            const escHandler = (e) => {
                if (e.key === 'Escape') {
                    hideConfirmModal();
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);
        }

        function hideConfirmModal(event) {
            // Only close if clicking overlay, not content
            if (event && event.target.classList.contains('modal-content')) {
                return;
            }
            const modal = document.getElementById('purge-modal');
            modal.style.display = 'none';
            modal.innerHTML = '';
        }

        async function purgeDatabase() {
            showConfirmModal(
                'Delete All Data',
                `
                    <p><strong>⚠️ WARNING: This will DELETE ALL data from the database!</strong></p>
                    <p>This includes:</p>
                    <ul>
                        <li>All stocks</li>
                        <li>All transactions</li>
                        <li>All price history</li>
                        <li>All indices</li>
                    </ul>
                    <p><strong>This action CANNOT be undone!</strong></p>
                `,
                '🗑️',
                async () => {
                    // Pause server status checks during purge
                    uploadInProgress = true;

                    try {
                        showUploadStatus('🗑️ Purging database...', true);

                        const response = await fetch('/api/purge-database', {
                            method: 'POST'
                        });

                        const result = await response.json();

                        if (result.success) {
                            // Clear holdings and disable purge button
                            holdings = [];
                            await updatePurgeButtonState();

                            showUploadStatus(
                                `✅ Database purged successfully!\n` +
                                `Deleted: ${result.deleted.stocks} stocks, ` +
                                `${result.deleted.transactions} transactions, ` +
                                `${result.deleted.stock_prices} prices\n` +
                                `Reloading page...`,
                                true
                            );
                            // Reload page after successful purge
                            setTimeout(() => {
                                window.location.reload();
                            }, 3000);
                        } else {
                            // Resume server status checks on failure
                            uploadInProgress = false;
                            showUploadStatus('❌ ' + result.message, false);
                        }
                    } catch (error) {
                        // Resume server status checks
                        uploadInProgress = false;
                        // Check if server went offline
                        const isOnline = await checkServerStatus();
                        if (!isOnline) {
                            return;
                        }
                        showUploadStatus('Error purging database: ' + error.message, false);
                    }
                }
            );
        }

        // Handle account statement upload
        document.getElementById('account-file-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            uploadInProgress = true;
            try {
                showUploadStatus('🏦 Uploading account statement...', true);

                const response = await fetch('/api/upload-account', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    showUploadStatus('✅ ' + result.message + ' — Refreshing...', true);
                    setTimeout(() => window.location.reload(), 2000);
                } else {
                    showUploadStatus('❌ ' + result.message, false);
                }
            } catch (error) {
                uploadInProgress = false;
                const isOnline = await checkServerStatus();
                if (!isOnline) { e.target.value = ''; return; }
                showUploadStatus('Error uploading file: ' + error.message, false);
            }

            uploadInProgress = false;
            e.target.value = '';
        });

        // ========================================
        // Time Travel
        // ========================================
        let ttMinDate = null;
        let ttMaxDate = null;
        let portfolioHistoryDates = [];
        let selectedHistoryDate = null;

        function clampDateToRange(date) {
            if (!date) return date;
            if (ttMinDate && date < ttMinDate) return ttMinDate;
            if (ttMaxDate && date > ttMaxDate) return ttMaxDate;
            return date;
        }

        function nearestHistoryDate(targetDate) {
            if (!portfolioHistoryDates.length || !targetDate) return targetDate;
            if (portfolioHistoryDates.includes(targetDate)) return targetDate;
            let nearest = portfolioHistoryDates[0];
            let bestDiff = Math.abs(new Date(nearest) - new Date(targetDate));
            for (const d of portfolioHistoryDates) {
                const diff = Math.abs(new Date(d) - new Date(targetDate));
                if (diff < bestDiff) {
                    nearest = d;
                    bestDiff = diff;
                }
            }
            return nearest;
        }

        function updateHistoryChartSelection(date, centerView = false) {
            const chartEl = document.getElementById('portfolio-valuation-chart');
            if (!chartEl || !chartEl.data || !chartEl.layout) return;

            const shapes = [{
                type: 'line',
                xref: 'x',
                yref: 'paper',
                x0: date,
                x1: date,
                y0: 0,
                y1: 1,
                line: { color: '#1098c9', width: 2, dash: 'dot' },
            }];

            const relayoutUpdate = { shapes };

            if (centerView) {
                const selected = new Date(date + 'T00:00:00');
                const left = new Date(selected);
                const right = new Date(selected);
                left.setDate(left.getDate() - 60);
                right.setDate(right.getDate() + 14);
                relayoutUpdate['xaxis.range'] = [left.toISOString().split('T')[0], right.toISOString().split('T')[0]];
            }

            Plotly.relayout('portfolio-valuation-chart', relayoutUpdate);
        }

        function syncHistoryDate(date, source = 'selector') {
            if (!date) return;
            const clamped = clampDateToRange(date);
            const snapped = nearestHistoryDate(clamped);
            selectedHistoryDate = snapped;

            const input = document.getElementById('tt-date');
            if (input && input.value !== snapped) {
                input.value = snapped;
            }

            const dateButton = document.getElementById('tt-date-button');
            if (dateButton) {
                dateButton.textContent = snapped;
            }

            loadTimeTravel(snapped);
            updateHistoryChartSelection(snapped, source === 'selector');
        }

        async function initTimeTravel() {
            try {
                const resp = await fetch('/api/time-travel/range');
                const range = await resp.json();
                ttMinDate = range.min_date;
                ttMaxDate = range.max_date;
                if (!ttMinDate || !ttMaxDate) return;

                const input = document.getElementById('tt-date');
                input.min = ttMinDate;
                input.max = ttMaxDate;
                input.value = ttMaxDate;
                input.addEventListener('change', () => syncHistoryDate(input.value, 'selector'));

                syncHistoryDate(ttMaxDate, 'init');
            } catch (err) {
                console.error('Failed to init time travel:', err);
            }
        }

        function ttShiftDate(delta) {
            const input = document.getElementById('tt-date');
            if (!input.value || !portfolioHistoryDates.length) return;
            const current = input.value;
            const idx = portfolioHistoryDates.indexOf(current);
            let nextIdx;
            if (idx === -1) {
                // Current date not in list; find nearest in the desired direction
                if (delta > 0) {
                    nextIdx = portfolioHistoryDates.findIndex(d => d > current);
                    if (nextIdx === -1) return; // already past last date
                } else {
                    nextIdx = portfolioHistoryDates.slice().reverse().findIndex(d => d < current);
                    if (nextIdx === -1) return;
                    nextIdx = portfolioHistoryDates.length - 1 - nextIdx;
                }
            } else {
                nextIdx = idx + delta;
            }
            if (nextIdx < 0 || nextIdx >= portfolioHistoryDates.length) return;
            const newDate = portfolioHistoryDates[nextIdx];
            input.value = newDate;
            syncHistoryDate(newDate, 'nav');
        }

        async function loadTimeTravel(date) {
            const container = document.getElementById('tt-content');
            container.innerHTML = '<div class="tt-loading">Loading portfolio snapshot...</div>';

            try {
                const resp = await fetch(`/api/time-travel?date=${encodeURIComponent(date)}`);
                const data = await resp.json();
                renderTimeTravel(data);
            } catch (err) {
                container.innerHTML = '<div class="tt-empty">Failed to load data.</div>';
                console.error('Time travel error:', err);
            }
        }

        function renderTimeTravel(data) {
            const container = document.getElementById('tt-content');
            const headerContainer = document.getElementById('tt-header-display');

            if (!data.holdings || data.holdings.length === 0) {
                container.innerHTML = '<div class="tt-empty">No holdings on this date.</div>';
                if (headerContainer) headerContainer.innerHTML = '';
                return;
            }

            const fmtEur = (v) => '€ ' + Math.abs(v).toLocaleString('nl-NL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const sign = (v) => v > 0 ? '+' : (v < 0 ? '-' : '');
            const changeCls = (v) => v >= 0 ? 'positive' : 'negative';

            // Separate stocks and ETFs/trackers
            // Heuristic: if exchange is XET or name contains ETF/Tracker/UCITS, it's a tracker
            const trackerKeywords = ['ETF', 'UCITS', 'Tracker', 'iShares', 'Vanguard', 'SPDR', 'Amundi', 'Xtrackers', 'Lyxor'];
            const isTracker = (h) => trackerKeywords.some(kw => (h.name || '').toLowerCase().includes(kw.toLowerCase()));

            const stocks = data.holdings.filter(h => !isTracker(h));
            const trackers = data.holdings.filter(h => isTracker(h));

            function renderHoldingRow(h) {
                const priceStr = h.price != null ? formatPrice(h.price, h.currency) : '—';
                const metaExchange = h.exchange || '';
                const metaLine = `${metaExchange} | ${priceStr} × ${h.shares}`;
                const valueStr = h.total_value_eur != null ? fmtEur(h.total_value_eur) : '—';

                let changeHtml = '';
                if (h.daily_change_eur != null) {
                    const cls = changeCls(h.daily_change_eur);
                    const pctStr = h.daily_change_pct != null
                        ? ` (${sign(h.daily_change_pct)}${Math.abs(h.daily_change_pct).toLocaleString('nl-NL', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%)`
                        : '';
                    changeHtml = `<div class="tt-holding-change ${cls}">${sign(h.daily_change_eur)}${fmtEur(h.daily_change_eur)}${pctStr}</div>`;
                }

                return `
                    <div class="tt-holding-row">
                        <div class="tt-holding-left">
                            <div class="tt-holding-name">${h.name}</div>
                            <div class="tt-holding-meta">${metaLine}</div>
                        </div>
                        <div class="tt-holding-right">
                            <div class="tt-holding-value">${valueStr}</div>
                            ${changeHtml}
                        </div>
                    </div>
                `;
            }

            function renderSection(title, items, sectionId) {
                if (!items.length) return '';
                // Use saved state or default to collapsed
                const isCollapsed = ttSectionStates[sectionId] !== undefined ? ttSectionStates[sectionId] : true;
                const collapsedClass = isCollapsed ? ' collapsed' : '';
                return `
                    <div class="tt-section">
                        <div class="tt-section-header" onclick="toggleTTSection('${sectionId}')">
                            <div class="tt-section-title">${title}</div>
                            <span class="tt-section-toggle${collapsedClass}" id="${sectionId}-toggle">▾</span>
                        </div>
                        <div class="tt-section-content${collapsedClass}" id="${sectionId}-content">
                            <div class="tt-sort-row">
                                <span>Koers × Aantal</span>
                                <span>Dag +/−</span>
                            </div>
                            <div class="tt-holdings-list">
                                ${items.map(renderHoldingRow).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            const changeText = `${sign(data.daily_change_eur)}${fmtEur(data.daily_change_eur)} (${sign(data.daily_change_pct)}${Math.abs(data.daily_change_pct).toLocaleString('nl-NL', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%)`;

            if (headerContainer) {
                headerContainer.innerHTML = `
                    <div class="tt-header">
                        <div class="tt-header-value">${fmtEur(data.total_value_eur)}</div>
                        <div class="tt-header-change ${changeCls(data.daily_change_eur)}">
                            ${changeText}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = `
                ${renderSection('Stocks', stocks, 'tt-stocks')}
                ${renderSection("Trackers (ETF's)", trackers, 'tt-trackers')}
            `;
        }

        // Load and display cash movements
        async function loadCashMovements() {
            try {
                const response = await fetch('/api/cash-movements');
                const data = await response.json();

                if (!data.movements || data.movements.length === 0) return;

                const section = document.getElementById('cash-movements-section');
                section.style.display = 'block';

                // Render summary
                const s = data.summary;
                document.getElementById('cash-summary-grid').innerHTML = `
                    <div class="summary-stat">
                        <div class="summary-label">Total Deposits</div>
                        <div class="summary-value positive">+€${s.total_deposits.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                    <div class="summary-stat">
                        <div class="summary-label">Total Withdrawals</div>
                        <div class="summary-value negative">-€${s.total_withdrawals.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                    <div class="summary-stat">
                        <div class="summary-label">Net Deposited</div>
                        <div class="summary-value">€${s.net_deposits.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                    <div class="summary-stat">
                        <div class="summary-label">Movements</div>
                        <div class="summary-value">${s.count}</div>
                    </div>
                `;

                // Render table
                const tbody = document.getElementById('cash-movements-body');
                tbody.innerHTML = data.movements.map(m => {
                    const date = new Date(m.date).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });
                    const isDeposit = m.type === 'deposit';
                    const color = isDeposit ? '#48bb78' : '#fc8181';
                    const sign = isDeposit ? '+' : '-';
                    const typeLabel = isDeposit ? '↓ Deposit' : '↑ Withdrawal';
                    const balanceStr = m.balance != null
                        ? `€${m.balance.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`
                        : '—';

                    return `<tr style="border-bottom: 1px solid #e2e8f0;">
                        <td style="padding: 8px 12px;">${date}</td>
                        <td style="padding: 8px 12px; color: ${color}; font-weight: 600;">${typeLabel}</td>
                        <td style="padding: 8px 12px; color: #718096;">${m.description}</td>
                        <td style="padding: 8px 12px; text-align: right; font-weight: 600; color: ${color};">
                            ${sign}€${Math.abs(m.amount).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                        </td>
                        <td style="padding: 8px 12px; text-align: right; color: #4a5568;">${balanceStr}</td>
                    </tr>`;
                }).join('');

            } catch (error) {
                console.error('Failed to load cash movements:', error);
            }
        }

        // Live price updates
        let livePricesEnabled = false;
        let livePricesInterval = null;

        function setLiveRefreshLoading(isLoading) {
            const button = document.getElementById('live-refresh-btn');
            if (!button) return;
            button.classList.toggle('loading', isLoading);
        }

        async function refreshLivePrices(showToast = false) {
            setLiveRefreshLoading(true);
            try {
                if (showToast) {
                    showUploadStatus('Fetching live prices...', true);
                }

                const response = await fetch('/api/refresh-live-prices', {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.success && result.quotes) {
                    // Update holdings with new prices
                    result.quotes.forEach(quote => {
                        const holding = holdings.find(h => h.id === quote.stock_id);
                        if (holding) {
                            holding.latest_price = quote.price;
                            holding.price_change_pct = quote.change_percent;
                            holding.price_date = quote.timestamp || new Date().toISOString();
                        }
                    });

                    // Update portfolio summary and valuation chart with new prices
                    await loadPortfolioSummary();
                    await loadPortfolioValuationChart();

                    // Live prices are active; holdings and summary have been refreshed.
                    livePricesEnabled = true;

                    if (showToast) {
                        showUploadStatus(`Live prices updated (${result.count || 0} symbols)`, true);
                    }
                } else if (!result.success) {
                    console.log('Live prices not available:', result.message);
                    livePricesEnabled = false;
                    if (showToast) {
                        showUploadStatus('Failed to refresh live prices', false);
                    }
                }
            } catch (error) {
                console.error('Failed to refresh live prices:', error);
                // Check if server went offline
                await checkServerStatus();
                if (showToast) {
                    showUploadStatus('Error refreshing live prices: ' + error.message, false);
                }
            } finally {
                setLiveRefreshLoading(false);
            }
        }

        function startLivePriceUpdates() {
            if (livePricesInterval) {
                clearInterval(livePricesInterval);
            }

            // Poll every hour; backend also stores hourly snapshots server-side.
            livePricesInterval = setInterval(refreshLivePrices, 60 * 60 * 1000);
        }

        function stopLivePriceUpdates() {
            if (livePricesInterval) {
                clearInterval(livePricesInterval);
                livePricesInterval = null;
            }
        }

        // Initialize
        function setLoadingStatus(text) {
            const el = document.getElementById('loading-status');
            if (el) el.textContent = text;
        }

        async function initialize() {
            // Start continuous server monitoring (every 5 seconds)
            startServerMonitoring();

            // Check server status first
            const isOnline = await checkServerStatus();

            if (!isOnline) {
                return;
            }

            document.getElementById('portfolio-header').style.display = 'block';

            // Load summary, portfolio history, and deposits panels.
            setLoadingStatus('Loading holdings, summary, history, and deposits...');
            await Promise.all([
                loadHoldings(),
                loadPortfolioValuationChart(),
                loadPortfolioSummary(),
                loadCashMovements(),
                initTimeTravel(),
            ]);

            // Fetch live quotes for the exact moment of page load and persist them.
            await refreshLivePrices();
            startLivePriceUpdates();

            await updatePurgeButtonState();
            document.getElementById('loading').style.display = 'none';
        }

        initialize();
    </script>

    <!-- Purge Confirmation Modal -->
    <div id="purge-modal" style="display: none;">
        <!-- Modal will be populated by JavaScript -->
    </div>
</body>
</html>
